<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ser Ativo Home Basic</title>
<meta name="description" content="Acompanhamento de treinamento físico resistido domiciliar — Hospital das Clínicas UFPE" />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E5EFF" />
<meta name="mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ser Ativo" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', sans-serif;
    background: #F4F6FA;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  #root { min-height: 100vh; }

  #boot-loader {
    position: fixed; inset: 0;
    background: #FFFFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 9999;
  }
  #boot-loader .logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #1E5EFF, #4A7CFF, #57C84D);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(30,94,255,0.3);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #boot-loader .title {
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; color: #1A2340;
  }
  #boot-loader .sub {
    font-family: 'Inter', sans-serif; font-size: 12px; color: #8896B3;
  }

  #error-box {
    display: none;
    position: fixed; inset: 0; background: #FFFFFF; z-index: 10000;
    padding: 40px 24px; font-family: 'Inter', sans-serif;
    overflow-y: auto;
  }
  #error-box.show { display: block; }
  #error-box h2 { font-family: 'Poppins', sans-serif; color: #FF4757; }
  #error-box pre {
    background: #F4F6FA; padding: 16px; border-radius: 12px;
    font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    color: #1A2340;
  }
</style>
</head>
<body>

<div id="boot-loader">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <path d="M8 22L14 10L20 16L26 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="6" r="3" fill="white" fill-opacity="0.8"/>
    </svg>
  </div>
  <div class="title">Ser Ativo Home Basic</div>
  <div class="sub" id="boot-status">Carregando...</div>
</div>

<div id="error-box">
  <h2>⚠️ Erro ao carregar o aplicativo</h2>
  <p>Algo deu errado. Detalhes técnicos abaixo (envie um print para o suporte):</p>
  <pre id="error-details"></pre>
</div>

<div id="root"></div>

<!-- React + ReactDOM (production builds, via UMD — não requer build step) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- jsPDF para exportação de relatório -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
  // Captura global de erros para diagnóstico (mostra na tela em vez de tela branca)
  window.addEventListener('error', function (event) {
    showError(event.error ? (event.error.stack || event.error.message) : event.message);
  });
  window.addEventListener('unhandledrejection', function (event) {
    showError('Promise rejeitada: ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason));
  });

  function showError(details) {
    var loader = document.getElementById('boot-loader');
    if (loader) loader.style.display = 'none';
    var box = document.getElementById('error-box');
    var detailsEl = document.getElementById('error-details');
    if (detailsEl) detailsEl.textContent = String(details);
    if (box) box.className = 'show';
  }

  function updateBootStatus(msg) {
    var el = document.getElementById('boot-status');
    if (el) el.textContent = msg;
  }
</script>

<!-- App: arquivos JavaScript puro (React.createElement), carregados em ordem de dependência -->
<script src="app-core.js"></script>
<script src="app-screens-1.js"></script>
<script src="app-screens-2.js"></script>
<script src="app-screens-3.js"></script>
<script src="app-screens-4.js"></script>
<script src="app-screens-5.js"></script>
<script src="app-screens-6.js"></script>
<script src="app-main.js"></script>

<script>
  try {
    updateBootStatus('Iniciando...');

    if (!window.React || !window.ReactDOM) {
      throw new Error('React não carregou. Verifique sua conexão com a internet.');
    }
    if (!window.SerAtivo || !window.SerAtivo.SerAtivoApp) {
      throw new Error('Componentes do app não carregaram corretamente.');
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.SerAtivo.SerAtivoApp));

    requestAnimationFrame(function () {
      var loader = document.getElementById('boot-loader');
      if (loader) loader.style.display = 'none';
    });
  } catch (err) {
    showError(err.stack || err.message || String(err));
  }
</script>

<script>
  // Service worker para instalação como PWA + funcionamento offline
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('service-worker.js').catch(function (err) {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>

</body>
</html>
